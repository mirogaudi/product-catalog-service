server:
  port: 8080
  servlet.context-path: /pcs

management:
  enabled: false

logging:
  level:
    root: info
    org.springframework: warn
    mirogaudi.productcatalog: info

spring:
  application.name: product-catalog-service
  jpa:
    open-in-view: false
    hibernate.ddl-auto: validate
    properties:
      hibernate:
        connection.provider_disables_autocommit: true

  flyway:
    locations: classpath:db/migration

  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:mem:pcs-test
    username: sa
    password: # empty
    hikari:
      auto-commit: false
      maximum-pool-size: 5
      minimum-idle: 0

  h2.console:
    enabled: false

springdoc:
  swagger-ui:
    enabled: false

# Product catalog service (pcs)
pcs:
  # Base currency
  base-currency-code: EUR
  # Rates service
  rates:
    service.url: https://api.frankfurter.dev/v1/latest
    cache.evict:
      # Run at 16:01 CET every Monday till Friday
      cron: 0 1 16 ? * MON-FRI
      zone: CET
